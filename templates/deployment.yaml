apiVersion: apps/v1
kind: Deployment

metadata:
    name: nginx
    labels: 
        app: nginx
spec: 
    replicas: {{ .Values.deployment.replicas }}
    selector:
        matchLabels:
            app: nginx

    template:
        metadata: 
            labels:
                app: nginx
                
        spec:
            containers:
            - name: nginx
                image: nginx: {{ .Values.deployment.imageVersion }}        
